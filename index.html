<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind AI - Intelligent Document Q&A</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-brain"></i>
                    <span>DocuMind AI</span>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" id="themeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="btn-icon" id="settingsBtn">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="sidebar">
                <div class="upload-section">
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept=".pdf" hidden>
                        <div class="upload-content">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <h3>Upload Handwritten PDF</h3>
                            <p>Drag & drop or click to browse</p>
                            <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                                Choose File
                            </button>
                        </div>
                    </div>
                </div>

                <div class="document-info" id="documentInfo" style="display: none;">
                    <div class="info-card">
                        <h4><i class="fas fa-file-pdf"></i> Document Details</h4>
                        <div class="info-item">
                            <span class="label">File:</span>
                            <span class="value" id="docName">-</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Pages:</span>
                            <span class="value" id="docPages">-</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Chunks:</span>
                            <span class="value" id="docChunks">-</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Status:</span>
                            <span class="status-badge success" id="docStatus">Ready</span>
                        </div>
                    </div>

                    <button class="btn-danger" id="removeDoc">
                        <i class="fas fa-trash"></i> Remove Document
                    </button>
                </div>

                <div class="processing-status" id="processingStatus" style="display: none;">
                    <div class="processing-card">
                        <div class="spinner"></div>
                        <h4>Processing Document</h4>
                        <p id="processingMessage">Extracting text from PDF...</p>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-section">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="welcome-message">
                            <i class="fas fa-robot"></i>
                            <h2>Welcome to DocuMind AI</h2>
                            <p>Upload a handwritten PDF document to start asking questions</p>
                        </div>
                    </div>

                    <div class="chat-input-container">
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="queryInput" 
                                placeholder="Ask a question about your document..."
                                disabled
                            >
                            <button class="btn-send" id="sendBtn" disabled>
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="source-panel" id="sourcePanel" style="display: none;">
                    <div class="panel-header">
                        <h3><i class="fas fa-bookmark"></i> Sources</h3>
                        <button class="btn-icon" onclick="toggleSourcePanel()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="sources-list" id="sourcesList">
                        <!-- Sources will be populated here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="btn-icon" onclick="closeModal('settingsModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>Max Results (Top-K)</label>
                    <input type="number" id="topKSetting" value="5" min="1" max="10">
                </div>
                <div class="setting-item">
                    <label>Confidence Threshold</label>
                    <input type="range" id="confidenceThreshold" min="0" max="100" value="70">
                    <span id="confidenceValue">70%</span>
                </div>
                <div class="setting-item">
                    <label>Model</label>
                    <select id="modelSelect">
                        <option value="llama3">Llama 3</option>
                        <option value="mistral">Mistral</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('settingsModal')">Cancel</button>
                <button class="btn-primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
